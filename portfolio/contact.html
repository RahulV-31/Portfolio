<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" href="styles.css">
    <meta name="description" content="Contact Rahul Veggilam for data analysis and project collaboration.">
    <meta name="keywords" content="Rahul Veggilam, contact, data analysis, collaboration">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        .contact-form label {
            display: block;
            margin-top: 10px;
        }

        .contact-form input, .contact-form textarea, .contact-form button {
            display: block;
            margin-top: 5px;
            margin-bottom: 10px;
            width: 100%;
        }

        .contact-form input[type="text"], .contact-form input[type="email"], .contact-form textarea {
            width: calc(100% - 22px);
            padding: 10px;
            font-size: 14px;
        }

        .contact-form button {
            width: auto;
            padding: 10px 20px;
            font-size: 16px;
            background-color: #000;
            color: #fff;
            border: none;
            cursor: pointer;
        }

        .contact-form button:hover {
            background-color: #303529;
        }

        .submitted-message {
            display: none;
            color: green;
            font-size: 16px;
            margin-top: 20px;
        }
    </style>
    <script>
        function handleSubmit(event) {
            event.preventDefault();
            document.getElementById('submitted-message').style.display = 'block';

            // Clear the form inputs
            document.getElementById('contact-form').reset();
        }
    </script>
</head>
<body>
    <header>
        <div class="logo">
            <span class="square"></span>Rahul Veggilam<span class="slash"></span>
        </div>
        <nav>
            <a href="index.html">ABOUT ME</a>
            <a href="resume.html">RESUME</a>
            <a href="projects.html">PROJECTS</a>
            <a href="contact.html" class="active">CONTACT</a> <!-- Highlight active page -->
        </nav>
    </header>
    <main>
        <div class="container">
            <div class="left-column">
                <h1>Rahul Veggilam</h1>
                <div class="social-media">
                    <a href="https://www.facebook.com"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://www.twitter.com"><i class="fab fa-twitter"></i></a>
                    <a href="https://www.instagram.com"><i class="fab fa-instagram"></i></a>
                    <a href="https://www.linkedin.com/in/rahul-veggilam-68522a260"><i class="fab fa-linkedin-in"></i></a>
                </div>
            </div>
            <div class="right-column">
                <h1>Contact Us</h1>
                <div class="contact-info">
                    <p>Our mailing address is: rahulveggilam@gmail.com</p>
                    <p>Thane, Mumbai</p>
                    <p>Phone: 9359687454<br>Great vision without great people is irrelevant. Let's work together.</p>
                </div>
                <div class="contact-form">
                    <form id="contact-form" onsubmit="handleSubmit(event)">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" placeholder="Enter your Name" required>

                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" placeholder="Enter a valid email address" required>

                        <label for="message">Message:</label>
                        <textarea id="message" name="message" rows="5" placeholder="Enter your message" required></textarea>

                        <button type="submit">Submit</button>
                    </form>
                    <div id="submitted-message" class="submitted-message">Submitted</div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
